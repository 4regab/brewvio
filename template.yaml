AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Brewvio - C# ASP.NET Core Web API on Lambda behind an API Gateway HTTP
  API, a static frontend on S3, and a single CloudFront distribution fronting both.
  Database is Supabase Postgres (reached over SSL via the DATABASE_URL).

  '
Parameters:
  SsmParameterPath:
    Type: String
    Default: /brewvio
    Description: 'SSM Parameter Store path prefix holding the app secrets. Create
      <path>/DATABASE_URL and <path>/JWT_KEY as SecureString parameters out-of-band
      (CloudFormation cannot create SecureString parameters).

      '
Globals:
  Function:
    Runtime: dotnet10
    Architectures:
    - arm64
    MemorySize: 1024
    Timeout: 60
Resources:
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100
  BrewvioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${AWS::StackName}-api
      CodeUri: src
      Handler: Brewvio
      Environment:
        Variables:
          SSM_PARAMETER_PATH:
            Ref: SsmParameterPath
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ssm:GetParametersByPath
          - ssm:GetParameters
          - ssm:GetParameter
          Resource:
          - Fn::Sub: arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPath}
          - Fn::Sub: arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPath}/*
        - Effect: Allow
          Action: kms:Decrypt
          Resource: '*'
          Condition:
            StringEquals:
              kms:ViaService:
                Fn::Sub: ssm.${AWS::Region}.amazonaws.com
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: Api
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: Api
            Path: /{proxy+}
            Method: ANY
    Metadata:
      SamResourceId: BrewvioFunction
  BrewvioFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${AWS::StackName}-api
      RetentionInDays: 30
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
        - Id: expire-noncurrent-versions
          Status: Enabled
          NoncurrentVersionExpiration:
            NoncurrentDays: 30
          AbortIncompleteMultipartUpload:
            DaysAfterInitiation: 7
  FrontendOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: ${AWS::StackName}-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
        - Id: s3-frontend
          DomainName:
            Fn::GetAtt:
            - FrontendBucket
            - RegionalDomainName
          OriginAccessControlId:
            Ref: FrontendOac
          S3OriginConfig:
            OriginAccessIdentity: ''
        - Id: api
          DomainName:
            Fn::Sub: ${Api}.execute-api.${AWS::Region}.amazonaws.com
          CustomOriginConfig:
            OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: s3-frontend
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
          - GET
          - HEAD
          - OPTIONS
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
        - PathPattern: /api/*
          TargetOriginId: api
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
          - GET
          - HEAD
          - OPTIONS
          - PUT
          - POST
          - PATCH
          - DELETE
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: FrontendBucket
      PolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${FrontendBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}
Outputs:
  SiteUrl:
    Description: Public URL (frontend + /api on one domain)
    Value:
      Fn::Sub: https://${Distribution.DomainName}
  FrontendBucketName:
    Description: Upload wwwroot/ contents here, then invalidate CloudFront
    Value:
      Ref: FrontendBucket
  ApiEndpoint:
    Description: Direct API Gateway endpoint (bypasses CloudFront)
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com
