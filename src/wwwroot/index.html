<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chao & Brew - POS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#9749;</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/app.css?v=20260605z" rel="stylesheet" />
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="auth-screen d-none">
    <div class="auth-navbar">
      <span class="auth-navbar-brand">Chao &amp; Brew</span>
    </div>
    <div id="auth-root" class="auth-root" style="margin-top:100px;"></div>
  </div>

  <!-- ===== APPLICATION SHELL ===== -->
  <div id="app-shell" class="app-shell d-none">
    <!-- Sidebar drawer (hidden by default, opens on hamburger click) -->
    <div class="sidebar-scrim" id="sidebar-scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-user" id="sidebar-user">
          <div class="avatar" id="sidebar-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-user-name">User</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Role</div>
          </div>
        </div>
      </div>
      <nav id="nav-menu" class="nav flex-column"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" id="sidebar-logout">
          <span class="sidebar-logout-label">Log Out</span>
          <span class="sidebar-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
        </button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="nav-toggle" aria-label="Open menu">
          <i class="bi bi-list fs-5"></i>
        </button>
        <span id="topbar-view-title" class="topbar-view-title"></span>
        <div class="topbar-right">
          <div class="topbar-left-dt" id="topbar-dt-block">
            <div class="topbar-dt-date">
              <i class="bi bi-calendar3"></i>
              <span id="topbar-date-text"></span>
            </div>
            <span class="topbar-dt-sep">—</span>
            <div class="topbar-dt-clock">
              <i class="bi bi-clock"></i>
              <span id="topbar-time-text"></span>
            </div>
          </div>
        </div>
      </header>
      <main id="app" class="view-container"></main>
    </div>
  </div>

  <!-- Generic modal -->
  <div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" id="app-modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="app-modal-title">Title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="app-modal-body"></div>
        <div class="modal-footer" id="app-modal-footer"></div>
      </div>
    </div>
  </div>

  <!-- Toast host -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-host" style="z-index:1090"></div>

  <!-- Printable receipt host -->
  <div id="print-area"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/api.js?v=20260605q"></script>
  <script src="js/ui.js?v=20260605p"></script>
  <script src="js/auth.js?v=20260605n"></script>
  <script src="js/pos.js?v=20260605w"></script>
  <script src="js/reports.js?v=20260605s"></script>
  <script src="js/manage.js?v=20260605r"></script>
  <script src="js/app.js?v=20260605v"></script>
</body>
</html>
