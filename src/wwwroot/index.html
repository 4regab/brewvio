<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brewvio — Coffee Shop POS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#9749;</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link href="css/app.css?v=20260604b" rel="stylesheet" />
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <!-- Top navbar is drawn by CSS ::before + .auth-navbar -->
  <div id="auth-screen" class="auth-screen d-none">
    <div class="auth-navbar">
      <span class="auth-navbar-brand">Brewvio</span>
    </div>
    <!-- All auth forms (role select, login, signup, authenticating, approved)
         are rendered dynamically by js/auth.js into #auth-root -->
    <div id="auth-root" class="auth-root" style="margin-top:100px;"></div>
  </div>

  <!-- ===== APPLICATION SHELL ===== -->
  <div id="app-shell" class="app-shell d-none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark sm">&#9749;</span>
        <span class="brand-name">Brewvio</span>
      </div>
      <nav id="nav-menu" class="nav flex-column"></nav>
      <div class="sidebar-footer">
        <div class="store-name" id="sidebar-store">Brewvio Coffee</div>
        <div class="sidebar-version">v1.0 &middot; POS</div>
      </div>
    </aside>
    <div class="sidebar-scrim" id="sidebar-scrim"></div>

    <div class="main">
      <header class="topbar">
        <button class="btn btn-sm d-lg-none me-2" id="nav-toggle"
          style="border:none;background:rgba(255,255,255,.1);color:#fff;">
          <i class="bi bi-list fs-5"></i>
        </button>
        <h2 id="view-title">Order</h2>
        <div class="ms-auto d-flex align-items-center gap-2 gap-md-3">
          <div class="text-end d-none d-sm-block">
            <div id="user-name"></div>
            <div id="user-role"></div>
          </div>
          <div class="avatar" id="user-avatar">U</div>
          <button id="logout-btn" class="btn btn-sm"
            style="border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:12px;">
            <i class="bi bi-box-arrow-right"></i>
            <span class="d-none d-md-inline ms-1">Sign out</span>
          </button>
        </div>
      </header>
      <main id="app" class="view-container"></main>
    </div>
  </div>

  <!-- Generic modal -->
  <div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" id="app-modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="app-modal-title">Title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="app-modal-body"></div>
        <div class="modal-footer" id="app-modal-footer"></div>
      </div>
    </div>
  </div>

  <!-- Toast host -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-host" style="z-index:1090"></div>

  <!-- Printable receipt host -->
  <div id="print-area"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/api.js?v=20260604b"></script>
  <script src="js/ui.js?v=20260604b"></script>
  <script src="js/auth.js?v=20260604b"></script>
  <script src="js/pos.js?v=20260604b"></script>
  <script src="js/shift.js?v=20260604b"></script>
  <script src="js/reports.js?v=20260604b"></script>
  <script src="js/manage.js?v=20260604b"></script>
  <script src="js/app.js?v=20260604b"></script>
</body>
</html>
