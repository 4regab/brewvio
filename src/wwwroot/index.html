<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chao & Brew - POS</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' ry='14' fill='%234a2c0a'/%3E%3C!-- steam left --%3E%3Cpath d='M24 18 Q22 14 24 10' stroke='white' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C!-- steam right --%3E%3Cpath d='M30 18 Q28 14 30 10' stroke='white' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C!-- cup body --%3E%3Cpath d='M18 23 h28 l-3 16 a4 4 0 0 1-4 3 H25 a4 4 0 0 1-4-3 Z' fill='white'/%3E%3C!-- handle --%3E%3Cpath d='M46 27 Q54 27 54 33 Q54 39 46 39' stroke='white' stroke-width='3' stroke-linecap='round' fill='none'/%3E%3C!-- saucer --%3E%3Cellipse cx='32' cy='43' rx='16' ry='3' fill='white'/%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/app.css?v=20260606k" rel="stylesheet" />
  <!-- Kick off the two startup API calls before JS even finishes parsing.
       By the time app.js runs Promise.all([me, settings/store]), responses may already be in flight. -->
  <link rel="preload" href="/api/auth/me" as="fetch" crossorigin="use-credentials" />
  <link rel="preload" href="/api/settings/store" as="fetch" crossorigin="use-credentials" />
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="auth-screen d-none">

    <!-- Top-left brand -->
    <nav class="auth-navbar">
      <span class="auth-navbar-logo" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 6.5c-1.7 1.5-1.7 3.2 0 4.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20.6 5c-1.9 1.7-1.9 3.6 0 5.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 15.5h19v6.5A8.5 8.5 0 0 1 19.5 30.5h-2A8.5 8.5 0 0 1 9 22V15.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M28 17.5h2.4a3.6 3.6 0 0 1 0 7.2H27" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="auth-navbar-name">Chao &amp; Brew</span>
    </nav>

    <!-- Split card -->
    <div class="auth-stage">
      <div class="auth-shell">

        <!-- Left: form (mounted by JS) -->
        <div id="auth-root" class="auth-root"></div>

        <!-- Right: brand panel -->
        <div class="auth-panel">
          <!-- Coffee shop SVG illustration -->
          <svg class="auth-panel-svg" viewBox="0 0 280 260" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Table -->
            <rect x="40" y="200" width="200" height="12" rx="6" fill="rgba(255,255,255,.2)"/>
            <rect x="85" y="212" width="14" height="40" rx="5" fill="rgba(255,255,255,.15)"/>
            <rect x="181" y="212" width="14" height="40" rx="5" fill="rgba(255,255,255,.15)"/>
            <!-- Cup body -->
            <path d="M100 140 L108 200 H172 L180 140 Z" fill="rgba(255,255,255,.22)" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
            <!-- Handle -->
            <path d="M180 155 Q205 155 205 172 Q205 190 180 190" stroke="rgba(255,255,255,.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <!-- Saucer -->
            <ellipse cx="140" cy="200" rx="50" ry="8" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
            <!-- Coffee surface -->
            <ellipse cx="140" cy="141" rx="38" ry="7" fill="rgba(171,122,68,.6)"/>
            <!-- Crema swirl -->
            <path d="M120 141 Q130 137 140 141 Q150 145 160 141" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Steam lines -->
            <path d="M125 125 Q122 116 125 107 Q128 98 125 89" stroke="rgba(255,255,255,.45)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M140 120 Q137 110 140 100 Q143 90 140 80" stroke="rgba(255,255,255,.55)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M155 125 Q158 116 155 107 Q152 98 155 89" stroke="rgba(255,255,255,.45)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Stars / sparkles -->
            <circle cx="65" cy="90" r="3" fill="rgba(255,255,255,.3)"/>
            <circle cx="210" cy="100" r="2.5" fill="rgba(255,255,255,.25)"/>
            <circle cx="55" cy="155" r="2" fill="rgba(255,255,255,.2)"/>
            <circle cx="220" cy="160" r="3.5" fill="rgba(255,255,255,.2)"/>
            <circle cx="80" cy="60" r="2" fill="rgba(255,255,255,.18)"/>
            <circle cx="200" cy="65" r="2.5" fill="rgba(255,255,255,.18)"/>
            <!-- Small beans -->
            <ellipse cx="72" cy="175" rx="10" ry="6" rx2="0" transform="rotate(-20 72 175)" fill="rgba(171,122,68,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
            <ellipse cx="208" cy="178" rx="10" ry="6" transform="rotate(15 208 178)" fill="rgba(171,122,68,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
          </svg>
          <div class="auth-panel-title">Chao &amp; Brew<br>Point of Sale</div>
          <div class="auth-panel-body">Manage orders, track inventory, and run your daily shift — fast and simple.</div>
        </div>

      </div>
    </div>

  </div>

  <!-- ===== APPLICATION SHELL ===== -->
  <div id="app-shell" class="app-shell d-none">
    <!-- Sidebar drawer (hidden by default, opens on hamburger click) -->
    <div class="sidebar-scrim" id="sidebar-scrim"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-user" id="sidebar-user">
          <div class="avatar" id="sidebar-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-user-name">User</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Role</div>
          </div>
        </div>
      </div>
      <nav id="nav-menu" class="nav flex-column"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" id="sidebar-logout">
          <span class="sidebar-logout-label">Log Out</span>
          <span class="sidebar-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
        </button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="nav-toggle" aria-label="Open menu">
          <i class="bi bi-list fs-5"></i>
        </button>
        <span id="topbar-view-title" class="topbar-view-title"></span>
        <div class="topbar-right">
          <div class="topbar-left-dt" id="topbar-dt-block">
            <div class="topbar-dt-date">
              <i class="bi bi-calendar3"></i>
              <span id="topbar-date-text"></span>
            </div>
            <span class="topbar-dt-sep">—</span>
            <div class="topbar-dt-clock">
              <i class="bi bi-clock"></i>
              <span id="topbar-time-text"></span>
            </div>
          </div>
        </div>
      </header>
      <main id="app" class="view-container"></main>
    </div>
  </div>

  <!-- Generic modal -->
  <div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" id="app-modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="app-modal-title">Title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="app-modal-body"></div>
        <div class="modal-footer" id="app-modal-footer"></div>
      </div>
    </div>
  </div>

  <!-- Toast host -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-host" style="z-index:1090"></div>

  <!-- Printable receipt host -->
  <div id="print-area"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script defer src="js/api.js?v=20260606k"></script>
  <script defer src="js/ui.js?v=20260606k"></script>
  <script defer src="js/auth.js?v=20260606k"></script>
  <script defer src="js/pos.js?v=20260606k"></script>
  <!-- reports.js and manage.js are lazy-loaded on first navigation to their views.
       Cashiers never download them; managers get them on demand. -->
  <script defer src="js/app.js?v=20260606k"></script>
</body>
</html>
